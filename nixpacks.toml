[phases.setup]
# Force cache invalidation
# Use the system Python provided by Railway's Nixpacks
nixPkgs = ["python312", "pip", "gettext", "dejavu_fonts", "nix"]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-eng", "tesseract-ocr-pol", "poppler-utils", "postgresql-client"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

# Tests run in GitHub Actions; production build skips pytest.
[phases.build]
cmds = [
  "python manage.py compilemessages --ignore venv --ignore .venv",
  "python manage.py collectstatic --no-input"
]

[start]
cmd = "bash start.sh"
