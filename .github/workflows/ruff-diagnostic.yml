name: Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install ruff==0.9.10
      - name: Capture Ruff report
        shell: bash
        run: |
          set +e
          ruff check . > ruff-report.txt 2>&1
          status=$?
          echo "ruff_exit_code=${status}" >> "$GITHUB_OUTPUT"
          cat ruff-report.txt
          exit 0
      - name: Upload Ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.txt
          if-no-files-found: error
