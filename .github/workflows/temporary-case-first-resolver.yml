name: Temporary case-first resolver

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  resolve-and-publish:
    if: github.event.pull_request.head.ref == 'chore/trigger-case-first-merge-main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the prepared case-first merge base
        uses: actions/checkout@v4
        with:
          ref: chore/resolve-case-first-merge
          fetch-depth: 0

      - name: Merge current main and publish result
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit -X ours origin/main
          git push --force-with-lease origin HEAD:refs/heads/chore/merged-case-first-ready
