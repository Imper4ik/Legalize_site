name: CI

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: legalize_site.settings.test
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext tesseract-ocr tesseract-ocr-pol poppler-utils postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Django check
        run: python manage.py check

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Pytest
        run: pytest --maxfail=1 -q

      - name: Ruff
        run: ruff check .

      - name: Bandit
        run: bandit -r . -x "*/migrations/*,*/tests/*"

      - name: pip-audit
        run: pip-audit

      - name: Compile messages
        run: python manage.py compilemessages --ignore "venv" --ignore ".venv"

      - name: Ensure no pycache artifacts committed
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$)'; then
            echo "Found committed __pycache__/pyc artifacts"
            git ls-files | grep -E '(__pycache__/|\.pyc$)'
            exit 1
          fi
