name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: legalize_site.settings.test
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install quality dependencies
        run: |
          python -m pip install --quiet --upgrade "pip>=26.1.2"
          pip install --quiet -r requirements-dev.txt

      - name: Ruff
        id: ruff
        continue-on-error: true
        run: ruff check . 2>&1 | tee ruff.log

      - name: Mypy
        id: mypy
        continue-on-error: true
        run: |
          set -o pipefail
          mypy clients legalize_site submissions users translations database_media fernet_fields --config-file mypy.ini 2>&1 | tee mypy.log

      - name: Bandit
        id: bandit
        continue-on-error: true
        run: |
          set -o pipefail
          bandit -r clients legalize_site submissions users database_media fernet_fields translations -x "*/migrations/*,*/tests/*,*/testing/*,*/demo/*,users/test_models.py" 2>&1 | tee bandit.log

      - name: pip-audit
        id: pip_audit
        continue-on-error: true
        run: |
          set -o pipefail
          pip-audit 2>&1 | tee pip-audit.log

      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            ruff.log
            mypy.log
            bandit.log
            pip-audit.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce quality gate
        if: always()
        env:
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          MYPY_OUTCOME: ${{ steps.mypy.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PIP_AUDIT_OUTCOME: ${{ steps.pip_audit.outcome }}
        run: |
          printf 'ruff=%s mypy=%s bandit=%s pip-audit=%s\n' \
            "$RUFF_OUTCOME" "$MYPY_OUTCOME" "$BANDIT_OUTCOME" "$PIP_AUDIT_OUTCOME"
          test "$RUFF_OUTCOME" = success
          test "$MYPY_OUTCOME" = success
          test "$BANDIT_OUTCOME" = success
          test "$PIP_AUDIT_OUTCOME" = success

  test-and-security:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: legalize_site.settings.test
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext tesseract-ocr tesseract-ocr-pol poppler-utils postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -r requirements-dev.txt

      - name: Compile messages
        run: python manage.py compilemessages --ignore "venv" --ignore ".venv"

      - name: Django check
        run: python manage.py check

      - name: Django production deploy check
        env:
          DJANGO_SETTINGS_MODULE: legalize_site.settings.production
          SECRET_KEY: ci-only-deploy-check-secret-key-not-for-production
          FERNET_KEYS: dCaMQOkEYCg-HvvtlWX7ZK4cT_BcrbaL1HPkMff3-nk=
          ALLOWED_HOSTS: ci.example.test
          CSRF_TRUSTED_ORIGINS: https://ci.example.test
          CRON_TOKEN: ci-only-cron-token
          ALLOW_PRODUCTION_LOCAL_MEDIA: "true"
        run: python manage.py check --deploy

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Django migrate check
        run: python manage.py migrate --noinput

      - name: Go-live regression tests
        run: |
          python manage.py test --noinput \
            legalize_site.tests.test_backups \
            legalize_site.tests.test_cron_auth \
            legalize_site.tests.test_healthcheck \
            clients.tests.test_activity_metadata \
            clients.tests.test_scheduler_policy

      - name: Django test
        run: |
          set +e
          python manage.py test --noinput > /tmp/django-test.log 2>&1
          status=$?
          tail -n 200 /tmp/django-test.log
          exit "$status"

      - name: Pytest
        run: pytest --maxfail=1 -q --cov-fail-under=70

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Ensure no pycache artifacts committed
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$)'; then
            echo "Found committed __pycache__/pyc artifacts"
            git ls-files | grep -E '(__pycache__/|\.pyc$)'
            exit 1
          fi

      - name: Check shell scripts syntax
        run: |
          bash -n start.sh
          bash -n release.sh
          bash -n build.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck start.sh release.sh build.sh
          fi
