name: CI

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: legalize_site.settings.test
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext tesseract-ocr tesseract-ocr-pol poppler-utils postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -r requirements-dev.txt

      - name: Compile messages
        run: python manage.py compilemessages --ignore "venv" --ignore ".venv"

      - name: Django check
        run: python manage.py check

      - name: Django deploy check
        run: python manage.py check --deploy

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Django migrate check
        run: python manage.py migrate --noinput

      - name: Django test
        run: python manage.py test --noinput

      - name: Pytest
        run: pytest --maxfail=1 -q --cov-fail-under=70

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy clients legalize_site submissions users translations database_media fernet_fields --config-file mypy.ini

      - name: Bandit
        run: bandit -r clients legalize_site submissions users database_media fernet_fields translations -x "*/migrations/*,*/tests/*"

      - name: pip-audit
        run: pip-audit

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Ensure no pycache artifacts committed
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$)'; then
            echo "Found committed __pycache__/pyc artifacts"
            git ls-files | grep -E '(__pycache__/|\.pyc$)'
            exit 1
          fi

      - name: Check shell scripts syntax
        run: |
          bash -n start.sh
          bash -n release.sh
          bash -n build.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck start.sh release.sh build.sh
          fi
