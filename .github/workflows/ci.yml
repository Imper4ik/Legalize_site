name: CI

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: legalize_site.settings.test
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext tesseract-ocr tesseract-ocr-pol poppler-utils postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -r requirements-dev.txt

      - name: Compile messages
        run: python manage.py compilemessages --ignore "venv" --ignore ".venv"

      - name: Django check
        run: python manage.py check

      - name: Django deploy check
        env:
          DJANGO_SETTINGS_MODULE: legalize_site.settings.production
          APP_ENV: production
          DEBUG: "False"
          SECRET_KEY: ci-only-production-secret-key-for-deploy-system-check-2026
          FERNET_KEYS: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          ALLOWED_HOSTS: ci.example.test
          CSRF_TRUSTED_ORIGINS: https://ci.example.test
          DATABASE_URL: "sqlite:///:memory:"
          USE_DATABASE_MEDIA_STORAGE: "True"
          DATABASE_MEDIA_FALLBACK_TO_FILE_SYSTEM: "False"
          EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
          EMAIL_HOST: smtp.example.test
          EMAIL_HOST_USER: ci-system-check
          EMAIL_HOST_PASSWORD: ci-only-placeholder
          DEFAULT_FROM_EMAIL: noreply@ci.example.test
          CRON_TOKEN: ci-only-cron-token
          CRON_ALLOWED_IPS: 127.0.0.1
        run: python manage.py check --deploy --fail-level ERROR

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Django migrate check
        run: python manage.py migrate --noinput

      - name: Django test
        run: python manage.py test --noinput

      - name: Pytest
        run: pytest --maxfail=1 -q --cov-fail-under=70

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy clients legalize_site submissions users translations database_media fernet_fields --config-file mypy.ini

      - name: Bandit
        run: bandit -r clients legalize_site submissions users database_media fernet_fields translations -x "*/migrations/*,*/tests/*,*/testing/*,*/demo/*,*/test_*.py,*/tests.py"

      - name: pip-audit
        run: pip-audit

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Ensure no pycache artifacts committed
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$)'; then
            echo "Found committed __pycache__/pyc artifacts"
            git ls-files | grep -E '(__pycache__/|\.pyc$)'
            exit 1
          fi

      - name: Check shell scripts syntax
        run: |
          bash -n start.sh
          bash -n release.sh
          bash -n build.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck start.sh release.sh build.sh
          fi
