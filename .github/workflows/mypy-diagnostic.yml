name: Mypy Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  mypy-diagnostic:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: legalize_site.settings.test
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -r requirements-dev.txt
      - name: Capture mypy report
        shell: bash
        run: |
          set +e
          mypy clients legalize_site submissions users translations database_media fernet_fields --config-file mypy.ini > mypy-report.txt 2>&1
          cat mypy-report.txt
          exit 0
      - name: Upload mypy report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt
          if-no-files-found: error
