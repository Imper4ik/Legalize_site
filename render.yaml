services:
  - type: web
    name: legalize-site
    runtime: python
    buildCommand: ./build.sh
    preDeployCommand: ./release.sh
    startCommand: ./start.sh
    healthCheckPath: /readyz/
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legalize-site-postgres
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: legalize_site.settings.production
      - key: ENABLE_TRANSLATION_TOOLING
        value: "False"
      - key: PYTHON_VERSION
        value: 3.12.6

databases:
  - name: legalize-site-postgres
    databaseName: legalize_site
    user: legalize_site
