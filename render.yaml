services:
  - type: web
    name: legalize-site
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /readyz/
    preDeployCommand: bash release.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legalize-site-postgres
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: legalize_site.settings.production
      - key: ENABLE_TRANSLATION_TOOLING
        value: "False"

databases:
  - name: legalize-site-postgres
    databaseName: legalize_site
    user: legalize_site
