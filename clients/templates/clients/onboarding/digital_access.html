{% extends "clients/onboarding/base_onboarding.html" %}

{% block title %}Цифровой доступ{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <div class="mb-4">
        <label class="form-label fw-bold">У вас есть номер PESEL?</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_pesel" id="pesel_yes" value="yes" required>
                <label class="form-check-label" for="pesel_yes">Да</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_pesel" id="pesel_no" value="no">
                <label class="form-check-label" for="pesel_no">Нет</label>
            </div>
        </div>
    </div>
    
    <div class="mb-4">
        <label class="form-label fw-bold">У вас есть Profil Zaufany?</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_trusted_profile" id="pz_yes" value="yes" required>
                <label class="form-check-label" for="pz_yes">Да</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_trusted_profile" id="pz_no" value="no">
                <label class="form-check-label" for="pz_no">Нет</label>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">У вас есть аккаунт MOS 2.0?</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_mos_account" id="mos_yes" value="yes" required>
                <label class="form-check-label" for="mos_yes">Да</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_mos_account" id="mos_no" value="no">
                <label class="form-check-label" for="mos_no">Нет</label>
            </div>
        </div>
    </div>

    <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary">Продолжить</button>
    </div>
</form>
{% endblock %}
