{% extends "clients/onboarding/base_onboarding.html" %}

{% block title %}Шаг 4: Финансы и Медицинская страховка{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    
    <div class="mb-4">
        <label class="form-label fw-bold">У вас есть источник дохода в Польше?</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_income" id="inc_yes" value="yes" {% if mos_data.financial_data.has_income %}checked{% endif %} required>
                <label class="form-check-label" for="inc_yes">Да</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_income" id="inc_no" value="no" {% if mos_data.financial_data.has_income == False %}checked{% endif %}>
                <label class="form-check-label" for="inc_no">Нет</label>
            </div>
        </div>
    </div>
    
    <div class="mb-4">
        <label for="income_source" class="form-label fw-bold">Укажите источник дохода (опционально)</label>
        <input type="text" class="form-control" id="income_source" name="income_source" value="{{ mos_data.financial_data.income_source|default:'' }}" placeholder="Например: Умова о праце с компанией XYZ">
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">У вас есть государственная страховка (ZUS)?</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_zus" id="zus_yes" value="yes" {% if mos_data.insurance_data.has_zus %}checked{% endif %} required>
                <label class="form-check-label" for="zus_yes">Да</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_zus" id="zus_no" value="no" {% if mos_data.insurance_data.has_zus == False %}checked{% endif %}>
                <label class="form-check-label" for="zus_no">Нет</label>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">У вас есть частная страховка (PZU, Warta и т.п.)?</label>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_private" id="priv_yes" value="yes" {% if mos_data.insurance_data.has_private %}checked{% endif %} required>
                <label class="form-check-label" for="priv_yes">Да</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="has_private" id="priv_no" value="no" {% if mos_data.insurance_data.has_private == False %}checked{% endif %}>
                <label class="form-check-label" for="priv_no">Нет</label>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between">
        <a href="{% url 'clients:onboarding_family_purpose' session.token_hash %}" class="btn btn-secondary">Назад</a>
        <button type="submit" class="btn btn-primary">Далее: Декларации</button>
    </div>
</form>
{% endblock %}
